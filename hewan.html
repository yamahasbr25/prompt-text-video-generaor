<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Jungle Scene Builder</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:30px}
.container{max-width:1200px;margin:auto}
.card{background:#111827;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.3)}
select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;font-size:14px}
select{background:#1f2937;color:#fff}
button{cursor:pointer}
.generate{background:#2563eb;color:white}
.copy{background:#10b981;color:white;margin-top:10px}
.random{background:#f59e0b;color:white;margin-top:10px}
textarea{width:100%;height:380px;margin-top:10px;background:#020617;color:#22c55e;border-radius:10px;padding:10px;border:none;font-family:monospace}
h1{margin-bottom:10px}
label{font-weight:bold;margin-top:12px;display:block}
</style>
</head>
<body>
<div class="container">
<h1>AI Jungle Scene Builder</h1>
<p>Create cinematic jungle wildlife prompts for AI video (Sora / Kling / Runway).</p>

<div class="card">

<label>Character Clothing</label>
<select id="clothing">
<option value="an olive green tank top">Tank Top</option>
<option value="a lightweight jungle explorer shirt">Explorer Shirt</option>
<option value="a sleeveless adventure vest">Adventure Vest</option>
<option value="a fitted outdoor t-shirt">Outdoor T‑Shirt</option>
<option value="a safari style shirt with rolled sleeves">Safari Shirt</option>
<option value="a rugged jungle survival top">Survival Top</option>
</select>

<label>Forest Location</label>
<select id="location">
<option value="a dense tropical rainforest with tall trees and thick vegetation">Tropical Rainforest</option>
<option value="a misty jungle with massive ancient trees">Misty Ancient Jungle</option>
<option value="a lush green jungle near a river">River Jungle</option>
<option value="a wild African savanna with scattered trees">Savanna Forest</option>
<option value="a deep jungle with giant vines and thick canopy">Deep Jungle</option>
<option value="a foggy jungle valley surrounded by mountains">Jungle Valley</option>
</select>

<label>Animal Database</label>
<select id="animal"></select>

<label>Animal Group Behavior</label>
<select id="behavior">
<option value="a calm group standing in the forest">Standing Calmly</option>
<option value="walking slowly through the jungle">Walking Through Jungle</option>
<option value="grazing and searching for food">Grazing</option>
<option value="drinking water near a river">Drinking Water</option>
<option value="moving together in a herd">Moving Herd</option>
</select>

<label>Camera Movement</label>
<select id="camera">
<option value="a handheld selfie style camera movement">Selfie Vlog</option>
<option value="a cinematic drone shot moving above the jungle">Drone Overhead</option>
<option value="a smooth cinematic tracking shot">Tracking Shot</option>
<option value="a slow cinematic orbit camera">Orbit Camera</option>
</select>

<label>Shot Composition</label>
<select id="shot">
<option value="close-up selfie framing">Close-up</option>
<option value="medium vlog framing">Medium Shot</option>
<option value="wide cinematic wildlife shot">Wide Wildlife Shot</option>
</select>

<label>Lighting</label>
<select id="lighting">
<option value="soft morning sunlight filtering through jungle leaves">Morning Light</option>
<option value="golden sunset light shining through the trees">Golden Hour</option>
<option value="soft overcast forest lighting">Overcast Jungle</option>
<option value="mystical foggy jungle lighting">Foggy Jungle</option>
</select>

<label>Environment Effects</label>
<select id="effects">
<option value="floating dust particles and light rays through leaves">Sun Rays</option>
<option value="light jungle mist drifting through the forest">Jungle Mist</option>
<option value="falling leaves and jungle particles">Falling Leaves</option>
<option value="none">None</option>
</select>

<label>Video Duration</label>
<select id="duration">
<option value="5">5 seconds</option>
<option value="8">8 seconds</option>
<option value="12">12 seconds</option>
<option value="15">15 seconds</option>
</select>

<label>Visual Style</label>
<select id="style">
<option value="cinematic photorealistic nature film">Cinematic Nature</option>
<option value="wildlife documentary realism">Wildlife Documentary</option>
<option value="epic cinematic jungle adventure">Jungle Adventure</option>
</select>

<button class="generate" onclick="generateJSON()">Generate JSON Prompt</button>
<button class="random" onclick="randomPrompt()">🎲 Random Jungle Scene</button>

</div>

<div class="card">
<label>Generated JSON</label>
<textarea id="output"></textarea>
<button class="copy" onclick="copyJSON()">Copy JSON</button>
</div>

</div>

<script>

const animalDB={
"Elephant":"a massive elephant with large curved tusks and wrinkled gray skin",
"Rhinoceros":"a large rhinoceros with thick armor-like skin and a prominent horn",
"Tiger":"a powerful tiger with orange fur and black stripes",
"Lion":"a majestic lion with golden fur and a large mane",
"Leopard":"a stealthy leopard with golden fur and dark rosette spots",
"Cheetah":"a fast cheetah with slim body and black tear stripes",
"Gorilla":"a huge gorilla with muscular body and dark fur",
"Chimpanzee":"a curious chimpanzee with expressive face and dark fur",
"Giraffe":"a tall giraffe with a very long neck and spotted pattern",
"Zebra":"a zebra with distinctive black and white stripes",
"Buffalo":"a massive wild buffalo with curved horns",
"Hippopotamus":"a large hippopotamus with thick skin near water",
"Crocodile":"a giant crocodile with armored scales and powerful jaws",
"Jaguar":"a muscular jaguar with golden coat and black rosettes",
"Panda":"a giant panda with black and white fur",
"Koala":"a small koala with fluffy gray fur sitting on tree branches",
"Kangaroo":"a strong kangaroo standing on powerful hind legs",
"Wolf":"a wild wolf with thick gray fur",
"Fox":"a small fox with reddish fur and bushy tail",
"Bear":"a huge brown bear with thick fur",
"Polar Bear":"a massive polar bear with white fur",
"Moose":"a giant moose with large antlers",
"Deer":"a graceful deer with slender legs",
"Wild Boar":"a muscular wild boar with tusks",
"Orangutan":"an orangutan with long arms and reddish fur"
}

const animalSelect=document.getElementById("animal")
Object.keys(animalDB).forEach(name=>{
const opt=document.createElement("option")
opt.value=name
opt.textContent=name
animalSelect.appendChild(opt)
})

function generateJSON(){

const clothing=document.getElementById('clothing').value
const location=document.getElementById('location').value
const animal=document.getElementById('animal').value
const animalDesc=animalDB[animal]
const behavior=document.getElementById('behavior').value
const camera=document.getElementById('camera').value
const shot=document.getElementById('shot').value
const lighting=document.getElementById('lighting').value
const effects=document.getElementById('effects').value
const duration=document.getElementById('duration').value
const style=document.getElementById('style').value

const json={
metadata:{
 title:"AI Jungle Wildlife Scene",
 generator:"AI Jungle Scene Builder"
},

video_analysis:{
subject:`A young woman with long brown hair and glasses wearing ${clothing} and a lightweight headset`,
setting:location,
background_elements:`${animal} described as ${animalDesc} ${behavior}`,
camera_movement:camera
},

ai_generation_prompt:{
text_to_video_prompt:`Cinematic ${shot} video of a young woman with long brown hair and glasses wearing ${clothing} and a lightweight headset exploring ${location}. The camera performs ${camera}. Behind her there is ${animal} described as ${animalDesc} ${behavior}. Lighting condition is ${lighting}. Environmental effect: ${effects}. Highly realistic wildlife behavior, photorealistic animal anatomy, cinematic nature documentary style. Visual style ${style}.`,

negative_prompt:"blurry, distorted animals, incorrect anatomy, cartoon style, anime style, unrealistic animals, low resolution",

technical_specs:{
aspect_ratio:"9:16",
resolution:"4K",
frame_rate:"30fps",
duration_seconds:Number(duration),
style:style
}
}
}

const formatted=JSON.stringify(json,null,2)
document.getElementById('output').value=formatted
}

function randomPrompt(){
const selects=document.querySelectorAll('select')
selects.forEach(select=>{
select.selectedIndex=Math.floor(Math.random()*select.options.length)
})

generateJSON()
}

function copyJSON(){
const text=document.getElementById('output')
text.select()
document.execCommand('copy')
alert('JSON copied')
}

</script>

</body>
</html>
