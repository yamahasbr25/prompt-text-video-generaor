<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Military Scene Builder ULTRA</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:30px}
.container{max-width:1200px;margin:auto}
.card{background:#111827;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.3)}
select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;font-size:14px}
select{background:#1f2937;color:#fff}
button{cursor:pointer}
.generate{background:#2563eb;color:white}
.copy{background:#10b981;color:white;margin-top:10px}
.random{background:#f59e0b;color:white;margin-top:10px}
textarea{width:100%;height:380px;margin-top:10px;background:#020617;color:#22c55e;border-radius:10px;padding:10px;border:none;font-family:monospace}
h1{margin-bottom:10px}
label{font-weight:bold;margin-top:12px;display:block}
</style>
</head>
<body>
<div class="container">
<h1>AI Military Scene Builder ULTRA</h1>
<center></center><a href="https://yamahasbr25.github.io/prompt-text-video-generaor/hewan-darat">Hewan Darat</a> | <a href="https://yamahasbr25.github.io/prompt-text-video-generaor/hewan-laut">Hewan Laut</a> <a href="https://yamahasbr25.github.io/prompt-text-video-generaor/hewan-laut-v2">v2</a> | <a href="https://yamahasbr25.github.io/prompt-text-video-generaor/Influencer">Influencer</a></center>
<p>Advanced cinematic prompt builder for Sora / AI video models.</p>

<div class="card">

<label>Location</label>
<select id="location">
<option value="a desert military airbase runway">Military Airbase Runway</option>
<option value="the flight deck of a large aircraft carrier at sea">Aircraft Carrier</option>
<option value="a coastal military airstrip near the ocean">Coastal Base</option>
<option value="a frozen arctic military base covered with snow">Snow Base</option>
<option value="a jungle military airstrip surrounded by dense forest">Jungle Base</option>
<option value="a military base near a large futuristic city skyline">City Military Base</option>
</select>

<label>Aircraft (Global Fighter Database)</label>
<select id="aircraft"></select>

<label>Aircraft Formation</label>
<select id="formation">
<option value="parked in a straight lineup">Runway Lineup</option>
<option value="parked in a triangular squadron formation">Triangle Formation</option>
<option value="taxiing slowly on the runway">Taxi Formation</option>
<option value="flying overhead in tight formation">Flight Formation</option>
</select>

<label>Ground Vehicles</label>
<select id="vehicles">
<option value="none">None</option>
<option value="modern battle tanks positioned nearby">Battle Tanks</option>
<option value="mobile missile launcher trucks">Missile Trucks</option>
<option value="military logistics trucks and radar vehicles">Support Vehicles</option>
</select>

<label>Camera Movement</label>
<select id="camera">
<option value="a handheld selfie 360 degree spin">Selfie Spin</option>
<option value="a handheld walking vlog style camera">Walking Vlog</option>
<option value="a cinematic drone reveal rising upward">Drone Reveal</option>
<option value="a dramatic cinematic orbit camera movement">Cinematic Orbit</option>
</select>

<label>Shot Composition</label>
<select id="shot">
<option value="close-up selfie framing">Close-up</option>
<option value="medium vlog framing">Medium Shot</option>
<option value="wide cinematic reveal">Wide Shot</option>
</select>

<label>Lighting</label>
<select id="lighting">
<option value="bright midday sunlight">Midday Sun</option>
<option value="golden hour sunset lighting">Golden Hour</option>
<option value="overcast cinematic lighting">Overcast</option>
<option value="dramatic night lighting with runway lights">Night Base</option>
</select>

<label>Environment Effects</label>
<select id="effects">
<option value="heat haze rising from the runway">Jet Heat Haze</option>
<option value="dust blowing across the runway">Dust Storm</option>
<option value="light snow particles drifting through the air">Snow Particles</option>
<option value="none">None</option>
</select>

<label>Video Duration</label>
<select id="duration">
<option value="5">5 seconds</option>
<option value="8">8 seconds</option>
<option value="12">12 seconds</option>
<option value="15">15 seconds</option>
</select>

<label>Style</label>
<select id="style">
<option value="cinematic photorealistic film look">Cinematic</option>
<option value="realistic war documentary">War Documentary</option>
<option value="high budget hollywood action">Hollywood Action</option>
</select>

<button class="generate" onclick="generateJSON()">Generate JSON Prompt</button>
<button class="random" onclick="randomPrompt()">🎲 Random Viral Scene</button>

</div>

<div class="card">
<label>Generated JSON</label>
<textarea id="output"></textarea>
<button class="copy" onclick="copyJSON()">Copy JSON</button>
</div>

</div>

<script>

const aircraftDB={
"F-22 Raptor":"stealth fighter with diamond wings and twin outward canted stabilizers",
"F-35 Lightning II":"single engine stealth fighter with trapezoidal wings",
"F-16 Fighting Falcon":"single engine fighter with bubble canopy and cropped delta wings",
"F-15 Eagle":"large twin engine fighter with twin vertical tails",
"F/A-18 Super Hornet":"naval fighter with rectangular intakes and twin tails",
"Eurofighter Typhoon":"delta wing fighter with forward canards",
"Dassault Rafale":"delta wing fighter with canards and twin engines",
"Saab Gripen":"compact delta wing fighter with canards",
"MiG-29":"twin engine fighter with widely spaced engines",
"Su-27":"large flanker fighter with blended wing body",
"Su-30":"long range twin engine flanker",
"Su-35":"advanced flanker with thrust vectoring",
"Su-57":"stealth fighter with blended stealth fuselage",
"J-20":"large stealth fighter with canards",
"J-31":"angular stealth twin engine fighter",
"Mirage 2000":"single engine delta wing fighter",
"MiG-21":"classic interceptor with delta wing",
"MiG-31":"large twin engine interceptor",
"F-14 Tomcat":"variable sweep wing naval fighter",
"F-4 Phantom":"classic twin engine fighter",
"Tornado":"strike aircraft with variable sweep wings",
"KF-21":"modern stealth inspired fighter",
"HAL Tejas":"lightweight delta wing fighter",
"J-10":"single engine fighter with canards",
"Yak-141":"experimental VTOL fighter"
}

const aircraftSelect=document.getElementById("aircraft")
Object.keys(aircraftDB).forEach(name=>{
const opt=document.createElement("option")
opt.value=name
opt.textContent=name
aircraftSelect.appendChild(opt)
})

function generateJSON(){

const location=document.getElementById('location').value
const aircraft=document.getElementById('aircraft').value
const aircraftDesc=aircraftDB[aircraft]
const formation=document.getElementById('formation').value
const vehicles=document.getElementById('vehicles').value
const camera=document.getElementById('camera').value
const shot=document.getElementById('shot').value
const lighting=document.getElementById('lighting').value
const effects=document.getElementById('effects').value
const duration=document.getElementById('duration').value
const style=document.getElementById('style').value

const json={
metadata:{
 title:"AI Military Cinematic Scene",
 generator:"AI Military Scene Builder ULTRA"
},

video_analysis:{
subject:"A young woman with long brown hair and glasses wearing a cropped olive green tactical shirt and tactical headset",
setting:location,
background_elements:`${formation} of fighter aircraft resembling the ${aircraft} with ${aircraftDesc}, with ${vehicles}`,
camera_movement:camera
},

ai_generation_prompt:{
text_to_video_prompt:`Cinematic ${shot} video of a young woman with long brown hair and glasses wearing a cropped olive green tactical shirt and headset. The camera performs ${camera}. The scene takes place at ${location}. Behind her there is ${formation} of fighter aircraft resembling the ${aircraft} featuring ${aircraftDesc}. Lighting condition is ${lighting}. Environmental effect: ${effects}. Additional ground units: ${vehicles}. Photorealistic aviation geometry, cinematic lighting, realistic aircraft proportions, high detail environment, professional color grading. Style ${style}.`,

negative_prompt:"blurry, distorted aircraft, incorrect wing geometry, cartoon style, anime style, unrealistic aircraft shapes, low resolution",

technical_specs:{
aspect_ratio:"9:16",
resolution:"4K",
frame_rate:"30fps",
duration_seconds:Number(duration),
style:style
}
}
}

const formatted=JSON.stringify(json,null,2)
document.getElementById('output').value=formatted
}

function randomPrompt(){
const selects=document.querySelectorAll('select')
selects.forEach(select=>{
select.selectedIndex=Math.floor(Math.random()*select.options.length)
})
generateJSON()
}

function copyJSON(){
const text=document.getElementById('output')
text.select()
document.execCommand('copy')
alert('JSON copied')
}

</script>

</body>
</html>
